    keywords: ["sport", "football", "soccer", "league", "match", "piłka nożna", "liga", "mecz", "olimpiada", "igrzyska", "mistrzostwa"]
  - name: "celebryci"
    keywords: ["celebrity", "celebrities", "gossip", "skandal", "plotka", "gwiazda", "influencer", "reality show"]
  - name: "plotki"
    keywords: ["rumor", "tabloid", "paparazzi"]

summary_style: "szczegółowy"    # zwięzły | szczegółowy
language: "pl"                  # język raportów — wszystkie streszczenia zawsze po polsku
max_articles: 30                # limit artykułów w jednym raporcie
