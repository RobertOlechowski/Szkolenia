      keywords: ["AI", "artificial intelligence", "machine learning", "LLM", "GPT", "Claude", "deep learning", "neural network", "sztuczna inteligencja", "model językowy", "sieci neuronowe", "generative AI"]
    - name: "technologia"
      keywords: ["tech", "startup", "software", "app", "cloud", "SaaS", "open source", "Linux", "programming", "developer", "API"]
    - name: "nauka"
      keywords: ["science", "research", "study", "discovery", "physics", "biology", "chemistry", "space", "NASA", "badania", "odkrycie", "kosmos", "fizyka"]
    - name: "finanse osobiste"
      keywords: ["personal finance", "investing", "investment", "stock", "fund", "oszczędności", "inwestycje", "akcje", "obligacje", "ETF", "portfel", "dywidenda"]

exclude_topics:
