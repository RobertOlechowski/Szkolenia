# Preferencje użytkownika — edytuj wedle potrzeb

interests:
  high_priority:
    - name: "cyberbezpieczeństwo"
      keywords: ["cybersecurity", "security", "breach", "hack", "vulnerability", "CVE", "exploit", "ransomware", "phishing", "malware", "bezpieczeństwo", "atak", "wyciek", "podatność", "zagrożenie"]
    - name: "polityka"
      keywords: ["politics", "election", "government", "parliament", "sejm", "senat", "ustawa", "rząd", "wybory", "koalicja", "opozycja", "prezydent", "premier"]
    - name: "gospodarka"
      keywords: ["economy", "GDP", "PKB", "inflacja", "inflation", "recession", "recesja", "bezrobocie", "unemployment", "wzrost gospodarczy", "economic growth", "trade", "handel"]
    - name: "druk 3D"
      keywords: ["3D printing", "3D print", "additive manufacturing", "drukarka 3D", "filament", "SLA", "FDM", "SLS", "resin"]
    - name: "elektronika"
      keywords: ["electronics", "DIY", "Arduino", "Raspberry Pi", "ESP32", "PCB", "IoT", "embedded", "hardware", "mikrokontroler", "układ"]
    - name: "kryptowaluty"
      keywords: ["crypto", "cryptocurrency", "Bitcoin", "BTC", "Ethereum", "ETH", "blockchain", "DeFi", "token", "mining", "giełda krypto", "stablecoin"]

  normal:
